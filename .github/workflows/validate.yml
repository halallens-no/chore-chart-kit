name: Validate

on:
  push:
    paths:
      - 'templates/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'templates/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'

permissions:
  contents: read

jobs:
  schema:
    name: Templates pass JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats
      - name: Validate all templates against schema
        run: |
          shopt -s nullglob
          files=(templates/chore-charts/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No templates yet — skipping validation."
            exit 0
          fi
          ajv validate --spec=draft2020 -s templates/schema.json -d "templates/chore-charts/*.json"

  build-and-test:
    name: TypeScript build + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript compile
        run: npm run build
      - name: Run tests
        run: npm test
